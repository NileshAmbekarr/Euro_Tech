<header class="header" [class.scrolled]="isScrolled">
  <nav class="navbar">
    <div class="container">
      <div class="logo">
        <img src="assets/logo.png" alt="Eurocore Technologies Logo" class="logo-img" onerror="this.style.display='none'">
        <h2>Eurocore Technologies</h2>
      </div>
      <ul class="nav-menu" [class.active]="isMenuOpen">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a></li>
        <li><a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a></li>
        <li><a routerLink="/services" routerLinkActive="active" (click)="closeMenu()">Services</a></li>
        <li><a routerLink="/training" routerLinkActive="active" (click)="closeMenu()">Training</a></li>
        <li><a routerLink="/placement" routerLinkActive="active" (click)="closeMenu()">Placement</a></li>
        <li><a routerLink="/portfolio" routerLinkActive="active" (click)="closeMenu()">Portfolio</a></li>
        <li><a routerLink="/testimonials" routerLinkActive="active" (click)="closeMenu()">Testimonials</a></li>
        <li><a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a></li>
      </ul>
      <div class="header-actions">
        <span *ngIf="authService.isLoggedIn()" class="user-profile" (click)="toggleProfileMenu()">
          <span class="user-name">
            <i class="fas fa-user-circle"></i> {{ (authService.currentUser$ | async)?.username }}
            <i class="fas fa-chevron-down"></i>
          </span>
          <div class="profile-dropdown" [class.active]="isProfileMenuOpen">
            <button class="dropdown-item" routerLink="/profile" (click)="closeProfileMenu()">
              <i class="fas fa-user-edit"></i> Edit Profile
            </button>
            <button class="dropdown-item logout-btn" (click)="logout()">
              <i class="fas fa-sign-out-alt"></i> Logout
            </button>
          </div>
        </span>
        <button *ngIf="!authService.isLoggedIn()" class="cta-btn" routerLink="/contact">Enroll Now</button>
      </div>
      <div class="hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>
  <div class="menu-overlay" [class.active]="isMenuOpen" (click)="closeMenu()"></div>
</header>
