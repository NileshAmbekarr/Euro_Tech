<section class="page-hero">
  <div class="container">
    <h1>My Profile</h1>
    <p>Update Your Information</p>
  </div>
</section>

<section class="profile-section">
  <div class="container">
    <div class="profile-wrapper">
      <div class="profile-card">
        <div class="profile-header">
          <div class="profile-avatar">
            <i class="fas fa-user-circle"></i>
          </div>
          <h2>{{ user?.username }}</h2>
          <p>{{ user?.email }}</p>
        </div>

        <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="profile-form">
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" formControlName="firstName" placeholder="First Name">
              <span class="error" *ngIf="profileForm.get('firstName')?.invalid && profileForm.get('firstName')?.touched">
                First name is required
              </span>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" formControlName="lastName" placeholder="Last Name">
              <span class="error" *ngIf="profileForm.get('lastName')?.invalid && profileForm.get('lastName')?.touched">
                Last name is required
              </span>
            </div>
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" formControlName="email" placeholder="Email">
            <span class="error" *ngIf="profileForm.get('email')?.invalid && profileForm.get('email')?.touched">
              Valid email is required
            </span>
          </div>

          <div class="form-group">
            <label>Phone</label>
            <input type="tel" formControlName="phone" placeholder="Phone (10 digits)">
            <span class="error" *ngIf="profileForm.get('phone')?.invalid && profileForm.get('phone')?.touched">
              Valid 10-digit phone is required
            </span>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" [disabled]="profileForm.invalid || isLoading">
              <i class="fas fa-save"></i> Update Profile
            </button>
            <button type="button" class="btn btn-secondary" routerLink="/">
              <i class="fas fa-times"></i> Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
