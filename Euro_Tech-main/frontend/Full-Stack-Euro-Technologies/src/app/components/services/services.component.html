<section class="page-hero">
  <div class="container">
    <h1>Our Services</h1>
    <p>Our Training Programs</p>
    <p class="subtitle">Practical courses designed for real-world tech careers from beginner to advanced.</p>
  </div>
</section>

<section class="services">
  <div class="container">
    <div class="services-grid">
      <div class="service-card" *ngFor="let service of services">
        <i [class]="service.icon"></i>
        <h3>{{ service.title }}</h3>
        <p class="service-benefit">{{ service.benefit }}</p>
        <div class="service-meta">
          <span><i class="fas fa-clock"></i> {{ service.duration }}</span>
          <span><i class="fas fa-signal"></i> {{ service.level }}</span>
        </div>
        <button class="btn btn-primary" routerLink="/training">View Details</button>
      </div>
    </div>
  </div>
</section>
