services:
  # Backend Web Service (using Aiven MySQL as external database)
  - type: web
    name: eurotechnologies-backend
    env: java
    region: oregon
    rootDir: Euro_Tech-main/backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -Dspring.profiles.active=prod -jar target/bootcamp-api-1.0.0.jar
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: MAVEN_VERSION
        value: 3.9.6
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: jdbc:mysql://mysql-2f69a09f-doctorsearch00-40aa.a.aivencloud.com:11076/defaultdb?useSSL=true&requireSSL=true&serverTimezone=UTC
      - key: DATABASE_USERNAME
        value: avnadmin
      - key: DATABASE_PASSWORD
        sync: false
