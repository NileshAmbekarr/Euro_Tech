# Production Environment Configuration
# Using Aiven MySQL (SSL Required)

# Database Configuration (Aiven MySQL)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://mysql-2f69a09f-doctorsearch00-40aa.a.aivencloud.com:11076/defaultdb?useSSL=true&requireSSL=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:avnadmin}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Configuration for Production
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Flyway - disabled (using Hibernate ddl-auto instead)
spring.flyway.enabled=false

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.root=INFO
logging.level.com.bootcamp.api=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Server Configuration
server.port=${PORT:8080}

# CORS Configuration - Add your Vercel frontend URL after deploying
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# Don't let DB issues bring the whole health status to DOWN
management.health.db.enabled=true
